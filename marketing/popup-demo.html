<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads Clipper Popup Demo</title>
  <link rel="stylesheet" href="../popup/popup.css">
  <style>
    body {
      min-width: auto;
      width: 340px;
      margin: 24px auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(0,0,0,0.28);
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <header>
      <h1>📌 Threads Clipper</h1>
    </header>

    <main>
      <div class="status-card" id="statusCard">
        <div class="status-indicator connected"></div>
        <div class="status-text">
          <span>Obsidian 연결됨</span>
        </div>
      </div>

      <div class="stats-section">
        <div class="stat-item">
          <span class="stat-label">저장된 게시글</span>
          <span class="stat-value">128</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">오늘</span>
          <span class="stat-value">7</span>
        </div>
      </div>

      <div class="quick-settings">
        <label class="toggle-row">
          <span>좋아요 시 저장</span>
          <input type="checkbox" checked>
          <span class="toggle-slider"></span>
        </label>
        <label class="toggle-row">
          <span>저장 시 저장</span>
          <input type="checkbox" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="actions">
        <button class="btn btn-primary">⚙️ 설정</button>
        <button class="btn btn-secondary">🔍 연결 테스트</button>
      </div>
    </main>

    <footer>
      <p>v1.0.0 • <a href="#">도움말</a></p>
    </footer>
  </div>
</body>
</html>
