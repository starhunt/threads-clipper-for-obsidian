<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threads to Obsidian</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <header>
            <h1>📝 Threads to Obsidian</h1>
        </header>

        <main>
            <!-- Connection Status -->
            <div class="status-card" id="statusCard">
                <div class="status-indicator" id="statusIndicator"></div>
                <div class="status-text">
                    <span id="statusMessage">연결 확인 중...</span>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-label">저장된 게시글</span>
                    <span class="stat-value" id="savedCount">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">오늘</span>
                    <span class="stat-value" id="todayCount">-</span>
                </div>
            </div>

            <!-- Quick Settings -->
            <div class="quick-settings">
                <label class="toggle-row">
                    <span>좋아요 시 저장</span>
                    <input type="checkbox" id="quickLike" checked>
                    <span class="toggle-slider"></span>
                </label>
                <label class="toggle-row">
                    <span>저장 시 저장</span>
                    <input type="checkbox" id="quickSave" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button id="openOptions" class="btn btn-primary">⚙️ 설정</button>
                <button id="testConnection" class="btn btn-secondary">🔍 연결 테스트</button>
            </div>
        </main>

        <footer>
            <p><span id="versionText"></span> • <a href="#" id="helpLink">도움말</a></p>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>

</html>
