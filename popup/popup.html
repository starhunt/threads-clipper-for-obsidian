<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threads to Obsidian</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <header>
            <h1>📝 Threads to Obsidian</h1>
        </header>

        <main>
            <!-- Connection Status -->
            <div class="status-card" id="statusCard">
                <div class="status-indicator" id="statusIndicator"></div>
                <div class="status-text">
                    <span id="statusMessage" data-i18n="statusChecking">Checking connection...</span>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-label" data-i18n="savedPosts">Saved Posts</span>
                    <span class="stat-value" id="savedCount">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label" data-i18n="today">Today</span>
                    <span class="stat-value" id="todayCount">-</span>
                </div>
            </div>

            <!-- Quick Settings -->
            <div class="quick-settings">
                <label class="toggle-row">
                    <span data-i18n="saveOnLike">Save on Like</span>
                    <input type="checkbox" id="quickLike" checked>
                    <span class="toggle-slider"></span>
                </label>
                <label class="toggle-row">
                    <span data-i18n="saveOnSave">Save on Bookmark</span>
                    <input type="checkbox" id="quickSave" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button id="openOptions" class="btn btn-primary">⚙️ <span data-i18n="settings">Settings</span></button>
                <button id="testConnection" class="btn btn-secondary">🔍 <span data-i18n="testConnection">Test Connection</span></button>
            </div>
        </main>

        <footer>
            <p><span id="versionText"></span> • <a href="#" id="helpLink" data-i18n="help">Help</a></p>
        </footer>
    </div>

    <script src="../shared/i18n.js"></script>
    <script src="popup.js"></script>
</body>

</html>
